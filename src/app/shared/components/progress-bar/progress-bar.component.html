<div class="progress-wrapper">

  <div class="progress-track">

    <div class="progress-fill" [style.width.%]="progressPercentage">
    </div>

  </div>

  <span class="progress-text">
    {{ progressPercentage }}%
  </span>

  <div class="episode-info">
    {{ watchedEpisodes }}
    /
    {{ totalEpisodes }}
    Episodes
  </div>

</div>
