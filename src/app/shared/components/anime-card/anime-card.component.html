<div class="anime-card" *ngIf="anime">

  <img
    [src]="getImage()"
    [alt]="getTitle()"
  />

  <h3>
    {{ getTitle() }}
  </h3>

  <p>
    Episodes:
    {{ anime.episodes || 'Unknown' }}
  </p>

  <p *ngIf="anime.score">
    Score:
    {{ anime.score }}
  </p>

  <button
    *ngIf="anime.id"
    [routerLink]="['/anime', anime.id]"
  >
    View Details
  </button>

  <button
    (click)="toggleFavorite(anime)"
  >
    {{ isFav ? '❤️ Favorited' : '🤍 Favorite' }}
  </button>

</div>
