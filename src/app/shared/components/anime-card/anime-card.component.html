<div class="anime-card" *ngIf="anime">

  <img [src]="anime?.coverImage?.large || anime?.image" [alt]="anime?.title?.romaji || anime?.title" />

  <h3>
    {{ anime?.title?.romaji || anime?.title?.english || anime?.title }}
  </h3>

  <p>Episodes: {{ anime.episodes }}</p>

  <p *ngIf="anime.score">
    Score: {{ anime.score }}
  </p>

  <button *ngIf="anime.id" [routerLink]="['/anime', anime.id]">
    View Details
  </button>

  <button (click)="toggleFavorite(anime)">
    {{ isFav ? '❤️ Favorited' : '🤍 Favorite' }}
  </button>

</div>
