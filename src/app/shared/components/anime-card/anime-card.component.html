<div class="anime-card">

  <img [src]="anime.coverImage.large" [alt]="anime.title.romaji">

  <h3>{{ anime.title.romaji }}</h3>

  <p>Episodes: {{ anime.episodes }}</p>

  <p *ngIf="anime.score">
    Score: {{ anime.score }}
  </p>

  <button *ngIf="anime.id" [routerLink]="['/anime', anime.id]">
    View Details
  </button>

</div>
