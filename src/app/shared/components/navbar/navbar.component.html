<nav class="desktop-nav">
  <div class="logo" routerLink="/">
    ✨ AniVault
  </div>

  <div class="nav-links">

    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
      Home
    </a>

    <a routerLink="/search" routerLinkActive="active">
      Search
    </a>

    <a routerLink="/recent" routerLinkActive="active">
      🔥 Recently Viewed
    </a>

    <a routerLink="/tracker" routerLinkActive="active">
      Tracker
    </a>

    <a routerLink="/statistics" routerLinkActive="active">
      Statistics
    </a>

    <a routerLink="/favorites" routerLinkActive="active">
      ❤️ Favorites ({{ favoritesCount }})
    </a>

    <a routerLink="/continue-watching" routerLinkActive="active">
      ▶️ Continue Watching
    </a>

  </div>

  <div class="nav-actions">

    <button class="theme-btn" (click)="themeService.toggleTheme()">

      {{ themeService.isDarkMode
      ? '☀️'
      : '🌙' }}

    </button>

    <div class="navbar-profile" routerLink="/profile">

      <img *ngIf="avatar" [src]="avatar">

      <span *ngIf="!avatar">
        👤
      </span>

    </div>

  </div>
</nav>

<nav class="mobile-topbar">

  <div class="logo" routerLink="/">
    ✨ AniVault
  </div>

  <div class="nav-actions">

    <button class="theme-btn" (click)="themeService.toggleTheme()">

      {{ themeService.isDarkMode ? '☀️' : '🌙' }}

    </button>

    <div class="navbar-profile" routerLink="/profile">

      <img *ngIf="avatar" [src]="avatar">

      <span *ngIf="!avatar">
        👤
      </span>

    </div>

  </div>

</nav>

<div class="mobile-bottom-nav">

  <a routerLink="/">
    <span>🏠</span>
    <small>Home</small>
  </a>

  <a routerLink="/search">
    <span>🔍</span>
    <small>Search</small>
  </a>

  <a routerLink="/tracker">
    <span>📚</span>
    <small>Track</small>
  </a>

  <a routerLink="/favorites">
    <span>❤️</span>
    <small>Fav</small>
  </a>

  <button class="more-btn" (click)="toggleMoreMenu()">

    <span>☰</span>
    <small>More</small>

  </button>

</div>

<div class="more-menu" *ngIf="showMore">

  <a routerLink="/recent">
    🔥 Recent
  </a>

  <a routerLink="/continue-watching">
    ▶️ Continue
  </a>

  <a routerLink="/statistics">
    📊 Statistics
  </a>

  <a routerLink="/profile">
    👤 Profile
  </a>

</div>
