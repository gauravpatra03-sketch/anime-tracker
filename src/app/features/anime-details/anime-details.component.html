<div *ngIf="anime">

    <img [src]="anime?.coverImage?.large" [alt]="anime?.title?.english || anime?.title?.romaji">

    <h1>
        {{ anime?.title?.english || anime?.title?.romaji }}
    </h1>

    <p>Episodes: {{ anime?.episodes }}</p>

    <p>Score: {{ anime?.score }}</p>

    <p>{{ anime?.synopsis }}</p>

    <button (click)="addToWatchlist()">
        Add to Watchlist
    </button>

</div>
