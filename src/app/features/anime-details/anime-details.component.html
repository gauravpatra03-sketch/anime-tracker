<div class="details-page">

  <button
    class="back-btn"
    (click)="goBack()"
  >
    ← Back to Search
  </button>

  <div
    class="details-card"
    *ngIf="anime"
  >

    <div class="poster-section">

      <img
        [src]="anime.coverImage?.large"
        [alt]="getTitle()"
      >

    </div>

    <div class="info-section">

      <h1>
        {{ getTitle() }}
      </h1>

      <div class="meta-info">

        <div class="meta-box">
          📺 {{ anime.episodes || 'Unknown' }}
          Episodes
        </div>

        <div class="meta-box">
          ⭐ {{ anime.score || 'N/A' }}
        </div>

      </div>

      <div class="synopsis-box">

        <h3>Synopsis</h3>

        <p [innerHTML]="anime.synopsis">
        </p>

      </div>

      <button
        class="watchlist-btn"
        (click)="addToWatchlist()"
      >
        ➕ Add to Watchlist
      </button>

    </div>

  </div>

</div>
