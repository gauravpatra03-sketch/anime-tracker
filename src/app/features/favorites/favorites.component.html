<div class="favorites-page">

  <div class="favorites-header">

    <h1>❤️ My Favorites</h1>

    <p>
      Your personal collection of beloved anime.
    </p>

  </div>

  <div
    *ngIf="favorites.length === 0"
    class="empty-state"
  >

    <h2>❤️ No Favorite Anime Yet</h2>

    <p>
      Start adding anime to build your collection.
    </p>

  </div>

  <div
    *ngIf="favorites.length > 0"
    class="favorites-grid"
  >

    <div
      class="favorite-item"
      *ngFor="let anime of favorites"
    >

      <app-anime-card
        [anime]="anime">
      </app-anime-card>

      <button
        class="remove-btn"
        (click)="remove(anime)"
      >

        ❌ Remove

      </button>

    </div>

  </div>

</div>
