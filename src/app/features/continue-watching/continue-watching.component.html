<div class="continue-page">

  <h1 class="page-title">
    Continue Watching ▶️
  </h1>

  <p class="subtitle">
    Pick up right where you left off.
  </p>

  <div
    *ngIf="continueWatching.length === 0"
    class="empty-box"
  >
    ▶️ No anime currently in progress.
  </div>

  <div class="continue-grid">

    <div
      class="continue-card"
      *ngFor="let anime of continueWatching"
    >

      <img
        [src]="anime.image"
        [alt]="anime.title"
      >

      <div class="card-content">

        <h3>
          {{ anime.title }}
        </h3>

        <p class="episode-text">

          Episode
          {{ anime.watchedEpisodes }}
          /
          {{ anime.episodes }}

        </p>

        <app-progress-bar
          [watchedEpisodes]="anime.watchedEpisodes || 0"
          [totalEpisodes]="anime.episodes || 0">
        </app-progress-bar>

        <button
          class="resume-btn"
          [routerLink]="['/anime', anime.id]"
        >
          ▶ Resume
        </button>

      </div>

    </div>

  </div>

</div>
