<h1>Anime Statistics 📊</h1>

<div class="stats-container">

  <div class="stat-card">
    <h3>📺 Total Anime</h3>
    <p>{{ totalAnime }}</p>
  </div>

  <div class="stat-card">
    <h3>🎬 Episodes Watched</h3>
    <p>{{ episodesWatched }}</p>
  </div>

  <div class="stat-card">
    <h3>👀 Watching</h3>
    <p>{{ watching }}</p>
  </div>

  <div class="stat-card">
    <h3>✅ Completed</h3>
    <p>{{ completed }}</p>
  </div>

  <div class="stat-card">
    <h3>📝 Plan to Watch</h3>
    <p>{{ planToWatch }}</p>
  </div>

  <div class="stat-card">
    <h3>❌ Dropped</h3>
    <p>{{ dropped }}</p>
  </div>

  <div class="stat-card">
    <h3>📈 Completion</h3>
    <p>{{ completionPercentage }}%</p>
  </div>

</div>
